<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Klasi — Kenttäsovellus</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f0f2f5;}

.nav{display:flex;background:#0B2F5C;padding:0;}
.nav-btn{flex:1;padding:14px 8px;color:#a0b4cc;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;}
.nav-btn.active{color:#fff;border-bottom:3px solid #4DAAFF;}

.page{display:none;padding:16px;}
.page.active{display:block;}

h2{font-size:16px;font-weight:600;color:#0B2F5C;margin-bottom:14px;}

.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.card-title{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;}

label{display:block;font-size:13px;color:#555;margin-bottom:4px;margin-top:10px;}
label:first-of-type{margin-top:0;}
input,select,textarea{
  width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;
  font-size:15px;font-family:inherit;background:#fff;color:#1a1a1a;
  -webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0B2F5C;}
textarea{resize:none;height:60px;}

.tulos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.tulos-btn{
  padding:11px 8px;border:1.5px solid #e0e0e0;border-radius:8px;
  font-size:13px;font-weight:500;text-align:center;cursor:pointer;
  background:#fff;color:#666;-webkit-tap-highlight-color:transparent;
}
.tulos-btn.active-kauppa{background:#e8f5e9;border-color:#2e7d32;color:#2e7d32;}
.tulos-btn.active-lämmin{background:#fff8e1;border-color:#f9a825;color:#e65100;}
.tulos-btn.active-eikotona{background:#fff3e0;border-color:#ef6c00;color:#e65100;}
.tulos-btn.active-kieltaytyi{background:#fce4ec;border-color:#c62828;color:#c62828;}

.hinta-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.hinta-row input{flex:1;}
.hinta-row span{font-size:14px;color:#888;white-space:nowrap;}

.submit-btn{
  width:100%;padding:15px;background:#0B2F5C;color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:14px;-webkit-tap-highlight-color:transparent;
}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{background:#aaa;}

/* Log */
.log-item{padding:12px 0;border-bottom:1px solid #f5f5f5;}
.log-item:last-child{border-bottom:none;}
.log-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
.log-name{font-size:14px;font-weight:600;color:#1a1a1a;}
.log-address{font-size:12px;color:#888;margin-bottom:2px;}
.log-meta{display:flex;gap:10px;align-items:center;}
.log-price{font-size:13px;color:#0B2F5C;font-weight:500;}
.log-time{font-size:11px;color:#bbb;}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;}
.badge-kauppa{background:#e8f5e9;color:#2e7d32;}
.badge-lämmin{background:#fff8e1;color:#e65100;}
.badge-eikotona{background:#fff3e0;color:#e65100;}
.badge-kieltaytyi{background:#fce4ec;color:#c62828;}
.empty{font-size:13px;color:#ccc;text-align:center;padding:20px 0;}

/* Map */
#map{width:100%;height:calc(100vh - 120px);border-radius:12px;overflow:hidden;}
.map-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;font-size:12px;background:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.filter-btn.active{background:#0B2F5C;color:#fff;border-color:#0B2F5C;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.stat-num{font-size:26px;font-weight:700;color:#0B2F5C;}
.stat-label{font-size:11px;color:#999;margin-top:2px;}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:10px;
  font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;
  white-space:nowrap;z-index:9999;
}
.toast.show{opacity:1;}
.toast.error{background:#c62828;}

.myyjä-select{margin-bottom:0;}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-btn active" onclick="naytaSivu('kirjaus')">Kirjaus</button>
  <button class="nav-btn" onclick="naytaSivu('kartta')">Kartta</button>
  <button class="nav-btn" onclick="naytaSivu('lista')">Lista</button>
  <button class="nav-btn" onclick="naytaSivu('tilastot')">Tilastot</button>
</div>

<!-- KIRJAUS -->
<div class="page active" id="sivu-kirjaus">
  <div style="padding-top:16px;">
  <div class="card">
    <div class="card-title">Myyjä</div>
    <input type="text" id="myyjä" placeholder="Nimesi" autocomplete="name" class="myyjä-select">
  </div>

  <div class="card">
    <div class="card-title">Tulos</div>
    <div class="tulos-grid">
      <div class="tulos-btn" onclick="valitseTulos('kauppa')" id="btn-kauppa">✓ Kauppa</div>
      <div class="tulos-btn" onclick="valitseTulos('lämmin')" id="btn-lämmin">🔥 Liidi lämmin</div>
      <div class="tulos-btn" onclick="valitseTulos('eikotona')" id="btn-eikotona">⌂ Ei kotona</div>
      <div class="tulos-btn" onclick="valitseTulos('kieltaytyi')" id="btn-kieltaytyi">✕ Kieltäytyi</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Asiakastiedot</div>
    <div id="hinta-kentta" style="display:none;">
      <label>Hinta</label>
      <div class="hinta-row">
        <input type="number" id="hinta" placeholder="0" inputmode="decimal" min="0">
        <span>€ (sis. ALV)</span>
      </div>
    </div>
    <label>Asiakkaan nimi</label>
    <input type="text" id="asiakas-nimi" placeholder="Etunimi Sukunimi" autocomplete="off">
    <label>Osoite</label>
    <input type="text" id="osoite" placeholder="Katuosoite, kaupunki" autocomplete="off" id="osoite-input">
    <label>Puhelinnumero <span style="color:#ccc;font-size:11px">valinnainen</span></label>
    <input type="tel" id="puhelin" placeholder="+358 40 123 4567" autocomplete="off">
    <label>Muistiinpanot <span style="color:#ccc;font-size:11px">valinnainen</span></label>
    <textarea id="muistiinpanot" placeholder="Palataan ensi viikolla, haluaa tarjouksen..."></textarea>
    <button class="submit-btn" id="submit-btn" onclick="lahetaKirjaus()">Kirjaa käynti</button>
  </div>
  </div>
</div>

<!-- KARTTA -->
<div class="page" id="sivu-kartta">
  <div style="padding-top:16px;">
  <div class="map-filters" id="map-filters">
    <button class="filter-btn active" onclick="suodataKartta('kaikki',this)">Kaikki</button>
    <button class="filter-btn" onclick="suodataKartta('kauppa',this)">✓ Kaupat</button>
    <button class="filter-btn" onclick="suodataKartta('lämmin',this)">🔥 Liidit</button>
    <button class="filter-btn" onclick="suodataKartta('eikotona',this)">⌂ Ei kotona</button>
    <button class="filter-btn" onclick="suodataKartta('kieltaytyi',this)">✕ Kieltäytyi</button>
  </div>
  <div id="map"></div>
  </div>
</div>

<!-- LISTA -->
<div class="page" id="sivu-lista">
  <div style="padding-top:16px;">
  <div class="card">
    <div class="card-title">Kaikki kirjaukset</div>
    <div id="log-lista"><div class="empty">Ladataan...</div></div>
  </div>
  </div>
</div>

<!-- TILASTOT -->
<div class="page" id="sivu-tilastot">
  <div style="padding-top:16px;">
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-num" id="stat-kaupat">—</div><div class="stat-label">Kaupat</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-liidit">—</div><div class="stat-label">Liidit</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-kaynnit">—</div><div class="stat-label">Käynnit yht.</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-myynti">—</div><div class="stat-label">Myynti €</div></div>
  </div>
  <div class="card">
    <div class="card-title">Myyjäkohtainen</div>
    <div id="myyjä-tilastot"><div class="empty">Ladataan...</div></div>
  </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const ALV=1.255, PROV=0.275;
let tulos=null, map=null, markers=[], kaikkiKirjaukset=[], accessToken=null, tokenExp=0;

const tulosLabels={kauppa:'Kauppa',lämmin:'Liidi lämmin',eikotona:'Ei kotona',kieltaytyi:'Kieltäytyi'};
const tulosVärit={kauppa:'#2e7d32',lämmin:'#f9a825',eikotona:'#ef6c00',kieltaytyi:'#c62828'};

function naytaSivu(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sivu-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id==='kartta'){initKartta();}
  if(id==='lista'){paivitaLista();}
  if(id==='tilastot'){paivitaTilastot();}
}

function valitseTulos(t){
  tulos=t;
  ['kauppa','lämmin','eikotona','kieltaytyi'].forEach(x=>{
    document.getElementById('btn-'+x).className='tulos-btn'+(x===t?' active-'+x:'');
  });
  document.getElementById('hinta-kentta').style.display=t==='kauppa'?'block':'none';
}

function naytaToast(msg,virhe=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(virhe?' error':'');
  setTimeout(()=>t.className='toast',2500);
}

function str2ab(b64){
  const bin=atob(b64);const buf=new ArrayBuffer(bin.length);
  const v=new Uint8Array(buf);for(let i=0;i<bin.length;i++)v[i]=bin.charCodeAt(i);return buf;
}

async function haeToken(){
  const now=Math.floor(Date.now()/1000);
  if(accessToken&&now<tokenExp-60)return accessToken;
  const hdr=btoa(JSON.stringify({alg:'RS256',typ:'JWT'})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const clm=btoa(JSON.stringify({iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const signing=hdr+'.'+clm;
  const key=await crypto.subtle.importKey('pkcs8',str2ab(PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'')),{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(signing));
  const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt=signing+'.'+sigB64;
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const data=await res.json();
  accessToken=data.access_token;tokenExp=now+3600;return accessToken;
}

async function varmistaSarakkeet(token){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Taulukko1!A1:M1`;
  const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
  const data=await res.json();
  if(!data.values||!data.values[0]||data.values[0][0]!=='Päivämäärä'){
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Taulukko1!A1:M1?valueInputOption=RAW`,{
      method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({values:[['Päivämäärä','Aika','Myyjä','Tulos','Asiakkaan nimi','Osoite','Puhelin','Hinta (€ sis.ALV)','ALV 0 (€)','Provisio 27,5% (€)','Lat','Lng','Muistiinpanot']]})
    });
  }
}

async function geocodeOsoite(osoite){
  try{
    const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(osoite+', Suomi')}&limit=1`;
    const res=await fetch(url,{headers:{'User-Agent':'KlasiApp/1.0'}});
    const data=await res.json();
    if(data&&data[0])return{lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
  }catch(e){}
  return null;
}

async function lahetaKirjaus(){
  const myyjä=document.getElementById('myyjä').value.trim();
  const nimi=document.getElementById('asiakas-nimi').value.trim();
  const osoite=document.getElementById('osoite').value.trim();
  const puhelin=document.getElementById('puhelin').value.trim();
  const hinta=document.getElementById('hinta').value.trim();
  const muistiinpanot=document.getElementById('muistiinpanot').value.trim();
  if(!myyjä){naytaToast('Kirjoita nimesi',true);return;}
  if(!tulos){naytaToast('Valitse tulos',true);return;}
  if(!osoite){naytaToast('Syötä osoite',true);return;}
  if(tulos==='kauppa'&&!hinta){naytaToast('Syötä hinta',true);return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Tallennetaan...';
  try{
    const now=new Date();
    const pvm=now.toLocaleDateString('fi-FI');
    const aika=now.toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});
    const hintaNum=parseFloat(hinta)||0;
    const alv0=hintaNum>0?+(hintaNum/ALV).toFixed(2):0;
    const provisio=alv0>0?+(alv0*PROV).toFixed(2):0;
    const token=await haeToken();
    await varmistaSarakkeet(token);
    const geo=await geocodeOsoite(osoite);
    const lat=geo?geo.lat:'';const lng=geo?geo.lng:'';
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Taulukko1!A:M:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{
      method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({values:[[pvm,aika,myyjä,tulosLabels[tulos],nimi,osoite,puhelin,hintaNum||'',alv0||'',provisio||'',lat,lng,muistiinpanot]]})
    });
    kaikkiKirjaukset.push({pvm,aika,myyjä,tulos,nimi,osoite,puhelin,hinta:hintaNum,lat,lng,muistiinpanot});
    if(map&&geo){lisaaMerkki({tulos,nimi,osoite,hinta:hintaNum,aika,myyjä,lat:geo.lat,lng:geo.lng});}
    naytaToast('✓ Kirjattu!');
    tulos=null;
    ['kauppa','lämmin','eikotona','kieltaytyi'].forEach(x=>document.getElementById('btn-'+x).className='tulos-btn');
    document.getElementById('hinta-kentta').style.display='none';
    ['asiakas-nimi','osoite','puhelin','hinta','muistiinpanot'].forEach(id=>{document.getElementById(id).value='';});
  }catch(e){naytaToast('Virhe tallennuksessa',true);console.error(e);}
  btn.disabled=false;btn.textContent='Kirjaa käynti';
}

function lisaaMerkki(k){
  if(!map||!k.lat||!k.lng)return;
  const väri=tulosVärit[k.tulos]||'#888';
  const icon=L.divIcon({className:'',html:`<div style="width:14px;height:14px;background:${väri};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
  const m=L.marker([k.lat,k.lng],{icon}).addTo(map);
  m.bindPopup(`<b>${k.nimi||'—'}</b><br>${k.osoite}<br><span style="color:${väri};font-weight:600">${tulosLabels[k.tulos]||k.tulos}</span>${k.hinta?`<br>${k.hinta} €`:''}<br><small>${k.myyjä} · ${k.aika||''}</small>`);
  markers.push({marker:m,tulos:k.tulos});
}

function initKartta(){
  if(map)return;
  map=L.map('map').setView([61.5,23.8],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  kaikkiKirjaukset.forEach(k=>lisaaMerkki(k));
}

function suodataKartta(f,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  markers.forEach(({marker,tulos})=>{
    if(f==='kaikki'||tulos===f)marker.addTo(map);else map.removeLayer(marker);
  });
}

async function lataaKirjaukset(){
  try{
    const token=await haeToken();
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Taulukko1!A2:M`,{headers:{Authorization:'Bearer '+token}});
    const data=await res.json();
    if(!data.values)return;
    kaikkiKirjaukset=data.values.map(r=>({
      pvm:r[0]||'',aika:r[1]||'',myyjä:r[2]||'',
      tulos:Object.keys(tulosLabels).find(k=>tulosLabels[k]===r[3])||r[3]||'',
      nimi:r[4]||'',osoite:r[5]||'',puhelin:r[6]||'',
      hinta:parseFloat(r[7])||0,lat:parseFloat(r[10])||null,lng:parseFloat(r[11])||null,
      muistiinpanot:r[12]||''
    }));
    paivitaLista();paivitaTilastot();
    if(map)kaikkiKirjaukset.forEach(k=>lisaaMerkki(k));
  }catch(e){console.error(e);}
}

function paivitaLista(){
  const lista=document.getElementById('log-lista');
  if(!kaikkiKirjaukset.length){lista.innerHTML='<div class="empty">Ei kirjauksia</div>';return;}
  lista.innerHTML=[...kaikkiKirjaukset].reverse().map(k=>`
    <div class="log-item">
      <div class="log-top">
        <div class="log-name">${k.nimi||'—'}</div>
        <span class="badge badge-${k.tulos}">${tulosLabels[k.tulos]||k.tulos}</span>
      </div>
      <div class="log-address">${k.osoite}</div>
      <div class="log-meta">
        ${k.hinta?`<span class="log-price">${k.hinta} €</span>`:''}
        <span class="log-time">${k.myyjä} · ${k.pvm} ${k.aika}</span>
      </div>
    </div>`).join('');
}

function paivitaTilastot(){
  const kaupat=kaikkiKirjaukset.filter(k=>k.tulos==='kauppa');
  const liidit=kaikkiKirjaukset.filter(k=>k.tulos==='lämmin');
  const myynti=kaupat.reduce((s,k)=>s+k.hinta,0);
  document.getElementById('stat-kaupat').textContent=kaupat.length;
  document.getElementById('stat-liidit').textContent=liidit.length;
  document.getElementById('stat-kaynnit').textContent=kaikkiKirjaukset.length;
  document.getElementById('stat-myynti').textContent=myynti.toFixed(0)+' €';
  const myyjät={};
  kaikkiKirjaukset.forEach(k=>{
    if(!myyjät[k.myyjä])myyjät[k.myyjä]={käynnit:0,kaupat:0,myynti:0};
    myyjät[k.myyjä].käynnit++;
    if(k.tulos==='kauppa'){myyjät[k.myyjä].kaupat++;myyjät[k.myyjä].myynti+=k.hinta;}
  });
  const el=document.getElementById('myyjä-tilastot');
  if(!Object.keys(myyjät).length){el.innerHTML='<div class="empty">Ei kirjauksia</div>';return;}
  el.innerHTML=Object.entries(myyjät).sort((a,b)=>b[1].myynti-a[1].myynti).map(([nimi,s])=>`
    <div style="padding:10px 0;border-bottom:1px solid #f5f5f5;">
      <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${nimi}</div>
      <div style="display:flex;gap:16px;font-size:12px;color:#888;">
        <span>Käynnit: <b style="color:#1a1a1a">${s.käynnit}</b></span>
        <span>Kaupat: <b style="color:#2e7d32">${s.kaupat}</b></span>
        <span>Myynti: <b style="color:#0B2F5C">${s.myynti.toFixed(0)} €</b></span>
      </div>
    </div>`).join('');
}

lataaKirjaukset();
</script>
</body>
</html>
